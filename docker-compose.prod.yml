services:
  api:
    container_name: app-api-prod
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
    command: sh -c "npm run build && npm start"

  app:
    container_name: my-app-prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_PORT: ${APP_PORT:-4200}
    ports:
      - "${VITE_PORT:-4200}:${APP_PORT:-4200}"
    environment:
      NODE_ENV: production
      VITE_API_PROXY_TARGET: http://api:3001
    env_file:
      - .env
    depends_on:
      - api
